<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú | Plazoleta de Comidas Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/menu.css">
</head>
<body>
  <header class="header">
    <div class="header__inner container">
      <a href="../index.html" class="header__brand">
        <img src="../img/logo-principal.png" alt="Logo Sabores Ocañeros" class="header__logo">
        <div class="header__titles">
          <span class="header__title">Plazoleta de Comidas Virtual</span>
          <span class="header__subtitle">Sabores Ocañeros · Gastronomía Tradicional</span>

      </a>
      <nav class="header__nav">
        <a href="../index.html" class="nav-link">INICIO</a>
        <a href="catalogo.html" class="nav-link nav-link--active">CATÁLOGO</a>
      </nav>
      <div class="header__actions">

        <button type="button" class="btn btn--outline" id="btn-cerrar-sesion">CERRAR SESIÓN</button>

    <div class="container" id="menu-content">
      <p class="menu-loading">Cargando menú...</p>

  <footer class="footer">
    <div class="container footer__inner">
      <p><strong>Plazoleta de Comidas Virtual</strong> · Sabores Ocañeros</p>
    </div>
  </footer>

  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    document.getElementById('btn-cerrar-sesion')?.addEventListener('click', () => {
      clearAuth();
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>
