<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo | Plazoleta de Comidas Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <header class="header">
    <div class="header__inner container">
      <a href="../index.html" class="header__brand">
        <img src="../img/logo-principal.png" alt="Logo Sabores Ocañeros" class="header__logo">
        <div class="header__titles">
          <span class="header__title">Plazoleta de Comidas Virtual</span>
          <span class="header__subtitle">Sabores Ocañeros · Gastronomía Tradicional</span>
        </div>
      </a>
      <nav class="header__nav">
        <a href="../index.html" class="nav-link">INICIO</a>
        <a href="catalogo.html" class="nav-link nav-link--active">CATÁLOGO</a>
      </nav>
      <div class="header__actions">
        <button type="button" class="btn btn--primary" onclick="location.href='../index.html#registro'">REGÍSTRATE</button>
        <a href="../index.html" class="btn btn--outline">INICIAR SESIÓN</a>
      </div>
    </div>
  </header>

  <main class="main-section">
    <div class="container">
      <h1 style="font-family: var(--font-serif); text-align: center; margin-bottom: 0.5rem;">Catálogo de emprendimientos</h1>
      <p style="text-align: center; color: var(--color-text-muted); margin-bottom: 2rem;">Explora todos los negocios aliados de la plazoleta virtual.</p>
      <div class="emprendimientos" id="emprendimientos-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p><strong>Plazoleta de Comidas Virtual</strong> · Sabores Ocañeros</p>
    </div>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
